<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
  }
  h1 {
    font-size: 2.5rem;
    margin-bottom: 15px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    background: linear-gradient(90deg, #e94560, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .controls {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat-box {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 10px;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 1.1rem;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  }
  .stat-box .icon { font-size: 1.3rem; }
  #newGameBtn {
    background: linear-gradient(135deg, #e94560, #c23a51);
    border: none;
    color: #fff;
    padding: 10px 25px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  }
  #newGameBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 10px rgba(0,0,0,0.4);
  }
  .grid-container {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(10, 40px);
    gap: 2px;
  }
  .cell {
    width: 40px;
    height: 40px;
    background: linear-gradient(145deg, #3a3f5c, #2a2d45);
    border: none;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    position: relative;
  }
  .cell:hover:not(.revealed):not(.game-over) {
    background: linear-gradient(145deg, #4a5070, #3a3d55);
    transform: scale(1.05);
  }
  .cell.revealed {
    background: linear-gradient(145deg, #1e2130, #151825);
    cursor: default;
  }
  .cell.mine-exploded {
    background: linear-gradient(145deg, #e94560, #c23a51) !important;
    animation: explode 0.5s ease-out;
  }
  .cell.mine-shown {
    background: linear-gradient(145deg, #2a1f2f, #1f1525);
  }
  @keyframes explode {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  .num-1 { color: #4fc3f7; }
  .num-2 { color: #81c784; }
  .num-3 { color: #ff8a65; }
  .num-4 { color: #ba68c8; }
  .num-5 { color: #e57373; }
  .num-6 { color: #4db6ac; }
  .num-7 { color: #fff176; }
  .num-8 { color: #90a4ae; }
  .best-times {
    margin-top: 15px;
    background: rgba(255,255,255,0.05);
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 0.9rem;
  }
  .best-times h3 { margin-bottom: 5px; color: #e94560; }
  #bestTimesList { list-style: none; }
  #bestTimesList li { padding: 2px 0; opacity: 0.8; }
  .message {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 1.1rem;
    display: none;
  }
  .message.win { background: rgba(76,175,80,0.3); display: block; }
  .message.lose { background: rgba(244,67,54,0.3); display: block; }
</style>
</head>
<body>
<h1>Minesweeper</h1>
<div class="controls">
  <div class="stat-box"><span class="icon">💣</span><span id="mineCount">15</span></div>
  <div class="stat-box"><span class="icon">⏱️</span><span id="timer">000</span></div>
  <button id="newGameBtn">New Game</button>
</div>
<div class="grid-container">
  <div class="grid" id="grid"></div>
</div>
<div id="message" class="message"></div>
<div class="best-times">
  <h3>🏆 Best Times</h3>
  <ul id="bestTimesList"></ul>
</div>

<script>
(function() {
  const ROWS = 10, COLS = 10, MINES = 15;
  let board, revealed, flagged, gameOver, firstClick, timer, seconds, minesLeft;

  const gridEl = document.getElementById('grid');
  const mineCountEl = document.getElementById('mineCount');
  const timerEl = document.getElementById('timer');
  const newGameBtn = document.getElementById('newGameBtn');
  const messageEl = document.getElementById('message');
  const bestTimesListEl = document.getElementById('bestTimesList');

  function init() {
    board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
    revealed = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));
    flagged = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));
    gameOver = false;
    firstClick = true;
    seconds = 0;
    minesLeft = MINES;
    clearInterval(timer);
    timer = null;
    updateDisplay();
    renderGrid();
    messageEl.className = 'message';
    messageEl.textContent = '';
  }

  function placeMines(safeR, safeC) {
    let placed = 0;
    const safeCells = new Set();
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        safeCells.add(`${safeR + dr},${safeC + dc}`);
      }
    }
    while (placed < MINES) {
      const r = Math.floor(Math.random() * ROWS);
      const c = Math.floor(Math.random() * COLS);
      if (board[r][c] !== -1 && !safeCells.has(`${r},${c}`)) {
        board[r][c] = -1;
        placed++;
      }
    }
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (board[r][c] === -1) continue;
        let count = 0;
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === -1) count++;
          }
        }
        board[r][c] = count;
      }
    }
  }

  function startTimer() {
    timer = setInterval(() => {
      seconds++;
      timerEl.textContent = String(seconds).padStart(3, '0');
    }, 1000);
  }

  function updateDisplay() {
    mineCountEl.textContent = minesLeft;
    timerEl.textContent = String(seconds).padStart(3, '0');
  }

  function renderGrid() {
    gridEl.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.r = r;
        cell.dataset.c = c;
        cell.addEventListener('click', handleClick);
        cell.addEventListener('contextmenu', handleRightClick);
        gridEl.appendChild(cell);
      }
    }
  }

  function getCell(r, c) {
    return gridEl.children[r * COLS + c];
  }

  function handleClick(e) {
    if (gameOver) return;
    const r = parseInt(e.target.dataset.r);
    const c = parseInt(e.target.dataset.c);
    if (flagged[r][c] || revealed[r][c]) return;

    if (firstClick) {
      firstClick = false;
      placeMines(r, c);
      startTimer();
    }

    if (board[r][c] === -1) {
      loseGame(r, c);
      return;
    }

    revealCell(r, c);
    checkWin();
  }

  function handleRightClick(e) {
    e.preventDefault();
    if (gameOver) return;
    const r = parseInt(e.target.dataset.r);
    const c = parseInt(e.target.dataset.c);
    if (revealed[r][c]) return;

    flagged[r][c] = !flagged[r][c];
    minesLeft += flagged[r][c] ? -1 : 1;
    updateDisplay();

    const cell = getCell(r, c);
    cell.textContent = flagged[r][c] ? '🚩' : '';
  }

  function revealCell(r, c) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
    if (revealed[r][c] || flagged[r][c]) return;

    revealed[r][c] = true;
    const cell = getCell(r, c);
    cell.classList.add('revealed');

    if (board[r][c] > 0) {
      cell.textContent = board[r][c];
      cell.classList.add('num-' + board[r][c]);
    } else if (board[r][c] === 0) {
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          revealCell(r + dr, c + dc);
        }
      }
    }
  }

  function checkWin() {
    let revealedCount = 0;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (revealed[r][c]) revealedCount++;
      }
    }
    if (revealedCount === ROWS * COLS - MINES) {
      winGame();
    }
  }

  function winGame() {
    gameOver = true;
    clearInterval(timer);
    messageEl.textContent = '🎉 You Win!';
    messageEl.className = 'message win';

    const bestTimes = getBestTimes();
    if (bestTimes.length < 5 || seconds < bestTimes[bestTimes.length - 1]) {
      bestTimes.push(seconds);
      bestTimes.sort((a, b) => a - b);
      if (bestTimes.length > 5) bestTimes.pop();
      localStorage.setItem('minesweeperBestTimes', JSON.stringify(bestTimes));
    }
    const bestTime = bestTimes[0];
    displayBestTimes();
    window.parent.postMessage({ type: 'gameOver', score: seconds, highScore: bestTime }, '*');
  }

  function loseGame(hitR, hitC) {
    gameOver = true;
    clearInterval(timer);
    messageEl.textContent = '💥 Game Over!';
    messageEl.className = 'message lose';

    const hitCell = getCell(hitR, hitC);
    hitCell.classList.add('mine-exploded');
    hitCell.textContent = '💣';

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (board[r][c] === -1 && !revealed[r][c]) {
          const cell = getCell(r, c);
          cell.classList.add('mine-shown');
          if (!(r === hitR && c === hitC)) {
            cell.textContent = '💣';
          }
        }
        if (flagged[r][c] && board[r][c] !== -1) {
          const cell = getCell(r, c);
          cell.textContent = '❌';
        }
      }
    }
    window.parent.postMessage({ type: 'gameOver', score: seconds, highScore: null }, '*');
  }

  function getBestTimes() {
    try { return JSON.parse(localStorage.getItem('minesweeperBestTimes')) || []; }
    catch { return []; }
  }

  function displayBestTimes() {
    const bestTimes = getBestTimes();
    bestTimesListEl.innerHTML = '';
    if (bestTimes.length === 0) {
      bestTimesListEl.innerHTML = '<li>No records yet. Be the first!</li>';
      return;
    }
    bestTimes.forEach((t, i) => {
      const li = document.createElement('li');
      li.textContent = `#${i + 1}: ${t}s`;
      bestTimesListEl.appendChild(li);
    });
  }

  newGameBtn.addEventListener('click', init);
  displayBestTimes();
  init();
})();
</script>
</body>
</html>
