<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            gap: 30px;
        }
        .game-area { display: flex; flex-direction: column; align-items: center; }
        h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        canvas {
            border: 4px solid #764ba2;
            border-radius: 10px;
            background: #1a1a2e;
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .info-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .info-label { font-size: 14px; text-transform: uppercase; opacity: 0.8; margin-bottom: 5px; }
        .info-value { font-size: 32px; font-weight: bold; }
        #nextPiece {
            background: #1a1a2e;
            border: 3px solid #764ba2;
            border-radius: 10px;
        }
        .controls {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        .game-over-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            border-radius: 10px;
        }
        .game-over-screen h2 { font-size: 48px; margin-bottom: 20px; }
        .final-score { font-size: 36px; color: #f5576c; margin-bottom: 20px; }
        .canvas-wrapper { position: relative; }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-area">
            <h1>TETRIS</h1>
            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="300" height="600"></canvas>
                <div class="game-over-screen" id="gameOverScreen">
                    <h2>Game Over!</h2>
                    <div class="final-score" id="finalScore">0</div>
                    <button onclick="startGame()">Play Again</button>
                </div>
            </div>
        </div>
        <div class="side-panel">
            <div class="info-box">
                <div class="info-label">Score</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">High Score</div>
                <div class="info-value" id="highScore">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">Level</div>
                <div class="info-value" id="level">1</div>
            </div>
            <div class="info-box">
                <div class="info-label">Lines</div>
                <div class="info-value" id="lines">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">Next</div>
                <canvas id="nextPiece" width="120" height="120"></canvas>
            </div>
            <div class="info-box controls">
                <p>← → Move</p>
                <p>↑ Rotate</p>
                <p>↓ Soft Drop</p>
                <p>Space Hard Drop</p>
            </div>
            <button onclick="startGame()">New Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextPiece');
        const nextCtx = nextCanvas.getContext('2d');
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;

        const PIECES = [
            { shape: [[1,1,1,1]], color: '#00f0f0' },  // I
            { shape: [[1,1],[1,1]], color: '#f0f000' },  // O
            { shape: [[0,1,0],[1,1,1]], color: '#a000f0' },  // T
            { shape: [[0,1,1],[1,1,0]], color: '#00f000' },  // S
            { shape: [[1,1,0],[0,1,1]], color: '#f00000' },  // Z
            { shape: [[1,0,0],[1,1,1]], color: '#0000f0' },  // J
            { shape: [[0,0,1],[1,1,1]], color: '#f0a000' }   // L
        ];

        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let lines = 0;
        let level = 1;
        let highScore = parseInt(localStorage.getItem('tetrisHighScore')) || 0;
        let dropInterval = 1000;
        let lastDrop = 0;
        let gameRunning = false;
        let animationId = null;

        document.getElementById('highScore').textContent = highScore;

        function createPiece() {
            const piece = PIECES[Math.floor(Math.random() * PIECES.length)];
            return {
                shape: piece.shape,
                color: piece.color,
                x: Math.floor(COLS / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0
            };
        }

        function startGame() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            score = 0;
            lines = 0;
            level = 1;
            dropInterval = 1000;
            updateUI();
            document.getElementById('gameOverScreen').style.display = 'none';
            currentPiece = createPiece();
            nextPiece = createPiece();
            drawNextPiece();
            gameRunning = true;
            if (animationId) cancelAnimationFrame(animationId);
            lastDrop = performance.now();
            gameLoop(performance.now());
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;
            
            if (timestamp - lastDrop > dropInterval) {
                moveDown();
                lastDrop = timestamp;
            }
            
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function moveDown() {
            currentPiece.y++;
            if (collision()) {
                currentPiece.y--;
                mergePiece();
                clearLines();
                currentPiece = nextPiece;
                nextPiece = createPiece();
                drawNextPiece();
                
                if (collision()) {
                    gameOver();
                }
            }
        }

        function hardDrop() {
            while (!collision()) {
                currentPiece.y++;
            }
            currentPiece.y--;
            score += 20;
            updateUI();
        }

        function collision() {
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        const newX = currentPiece.x + x;
                        const newY = currentPiece.y + y;
                        
                        if (newX < 0 || newX >= COLS || newY >= ROWS) return true;
                        if (newY >= 0 && board[newY][newX]) return true;
                    }
                }
            }
            return false;
        }

        function mergePiece() {
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        const boardY = currentPiece.y + y;
                        const boardX = currentPiece.x + x;
                        if (boardY >= 0) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                }
            }
        }

        function clearLines() {
            let linesCleared = 0;
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    y++;
                }
            }
            
            if (linesCleared > 0) {
                const points = [0, 100, 300, 500, 800];
                score += points[linesCleared] * level;
                lines += linesCleared;
                level = Math.floor(lines / 10) + 1;
                dropInterval = Math.max(100, 1000 - (level - 1) * 100);
                updateUI();
            }
        }

        function rotate() {
            const rotated = currentPiece.shape[0].map((_, i) =>
                currentPiece.shape.map(row => row[i]).reverse()
            );
            const oldShape = currentPiece.shape;
            currentPiece.shape = rotated;
            if (collision()) {
                currentPiece.shape = oldShape;
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lines').textContent = lines;
            document.getElementById('level').textContent = level;
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid lines
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(x * BLOCK_SIZE, 0);
                ctx.lineTo(x * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * BLOCK_SIZE);
                ctx.lineTo(canvas.width, y * BLOCK_SIZE);
                ctx.stroke();
            }
            
            // Draw board
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) {
                        drawBlock(ctx, x, y, board[y][x]);
                    }
                }
            }
            
            // Draw current piece
            if (currentPiece) {
                for (let y = 0; y < currentPiece.shape.length; y++) {
                    for (let x = 0; x < currentPiece.shape[y].length; x++) {
                        if (currentPiece.shape[y][x]) {
                            drawBlock(ctx, currentPiece.x + x, currentPiece.y + y, currentPiece.color);
                        }
                    }
                }
            }
        }

        function drawBlock(context, x, y, color) {
            context.fillStyle = color;
            context.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            context.strokeStyle = 'rgba(255,255,255,0.3)';
            context.lineWidth = 2;
            context.strokeRect(x * BLOCK_SIZE + 2, y * BLOCK_SIZE + 2, BLOCK_SIZE - 4, BLOCK_SIZE - 4);
        }

        function drawNextPiece() {
            nextCtx.fillStyle = '#1a1a2e';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (nextPiece) {
                const blockSize = 25;
                const offsetX = (nextCanvas.width - nextPiece.shape[0].length * blockSize) / 2;
                const offsetY = (nextCanvas.height - nextPiece.shape.length * blockSize) / 2;
                
                for (let y = 0; y < nextPiece.shape.length; y++) {
                    for (let x = 0; x < nextPiece.shape[y].length; x++) {
                        if (nextPiece.shape[y][x]) {
                            nextCtx.fillStyle = nextPiece.color;
                            nextCtx.fillRect(offsetX + x * blockSize, offsetY + y * blockSize, blockSize, blockSize);
                            nextCtx.strokeStyle = 'rgba(255,255,255,0.3)';
                            nextCtx.lineWidth = 2;
                            nextCtx.strokeRect(offsetX + x * blockSize + 2, offsetY + y * blockSize + 2, blockSize - 4, blockSize - 4);
                        }
                    }
                }
            }
        }

        function gameOver() {
            gameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('tetrisHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
            
            if (window.parent) {
                window.parent.postMessage({ type: 'gameOver', score, highScore }, '*');
            }
        }

        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    currentPiece.x--;
                    if (collision()) currentPiece.x++;
                    break;
                case 'ArrowRight':
                    currentPiece.x++;
                    if (collision()) currentPiece.x--;
                    break;
                case 'ArrowDown':
                    moveDown();
                    score += 1;
                    updateUI();
                    break;
                case 'ArrowUp':
                    rotate();
                    break;
                case ' ':
                    e.preventDefault();
                    hardDrop();
                    break;
            }
        });

        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) {
                    currentPiece.x++;
                    if (collision()) currentPiece.x--;
                } else if (dx < -30) {
                    currentPiece.x--;
                    if (collision()) currentPiece.x++;
                }
            } else {
                if (dy > 30) {
                    moveDown();
                } else if (dy < -30) {
                    rotate();
                }
            }
        });
    </script>
</body>
</html>
