<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .game-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #87CEEB 0%, #98D8C8 100%);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            color: white;
        }
        .overlay.hidden { display: none; }
        .overlay h1 {
            font-size: 56px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .overlay p { font-size: 24px; margin-bottom: 30px; }
        .score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 64px;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            z-index: 10;
        }
        button {
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        .final-score { font-size: 48px; color: #f5576c; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="score-display" id="scoreDisplay">0</div>
        <div class="overlay" id="startScreen">
            <h1>🐦 Flappy Bird</h1>
            <p>Tap, click, or press space to fly!</p>
            <button id="startBtn">START</button>
        </div>
        <div class="overlay hidden" id="gameOverScreen">
            <h1>Game Over!</h1>
            <div class="final-score" id="finalScore">0</div>
            <p id="highScoreText">High Score: 0</p>
            <button id="restartBtn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScore = document.getElementById('finalScore');
        const highScoreText = document.getElementById('highScoreText');

        const GRAVITY = 0.5;
        const FLAP_POWER = -8;
        const PIPE_WIDTH = 60;
        const PIPE_GAP = 160;
        const PIPE_SPEED = 3;

        let bird = { x: 100, y: 300, velocity: 0, radius: 20 };
        let pipes = [];
        let score = 0;
        let highScore = parseInt(localStorage.getItem('flappyHighScore')) || 0;
        let gameRunning = false;
        let frameCount = 0;
        let animationId = null;

        highScoreText.textContent = `High Score: ${highScore}`;

        function startGame() {
            bird = { x: 100, y: 300, velocity: 0, radius: 20 };
            pipes = [];
            score = 0;
            frameCount = 0;
            scoreDisplay.textContent = score;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            gameRunning = true;
            if (animationId) cancelAnimationFrame(animationId);
            update();
        }

        function flap() {
            if (gameRunning) {
                bird.velocity = FLAP_POWER;
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flap();
            }
        });

        canvas.addEventListener('mousedown', flap);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            flap();
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        function update() {
            if (!gameRunning) return;

            frameCount++;

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#98D8C8');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            for (let i = 0; i < 3; i++) {
                const cloudX = ((i * 150 + frameCount * 0.5) % (canvas.width + 100)) - 50;
                const cloudY = 50 + i * 40;
                ctx.beginPath();
                ctx.arc(cloudX, cloudY, 30, 0, Math.PI * 2);
                ctx.arc(cloudX + 25, cloudY - 10, 25, 0, Math.PI * 2);
                ctx.arc(cloudX + 50, cloudY, 30, 0, Math.PI * 2);
                ctx.fill();
            }

            // Update bird
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;

            // Draw bird
            ctx.save();
            ctx.translate(bird.x, bird.y);
            const rotation = Math.min(Math.max(bird.velocity * 0.05, -0.5), 0.5);
            ctx.rotate(rotation);

            // Body
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(8, -5, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(10, -5, 4, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#FF6347';
            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(25, 5);
            ctx.lineTo(15, 10);
            ctx.closePath();
            ctx.fill();

            // Wing
            ctx.fillStyle = '#FFA500';
            const wingY = Math.sin(frameCount * 0.3) * 5;
            ctx.beginPath();
            ctx.ellipse(-5, 5 + wingY, 12, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // Spawn pipes
            if (frameCount % 100 === 0) {
                const gapY = 150 + Math.random() * 250;
                pipes.push({
                    x: canvas.width,
                    gapY: gapY,
                    scored: false
                });
            }

            // Update and draw pipes
            pipes = pipes.filter(pipe => pipe.x + PIPE_WIDTH > 0);
            pipes.forEach(pipe => {
                pipe.x -= PIPE_SPEED;

                // Pipe gradient
                const pipeGrad = ctx.createLinearGradient(pipe.x, 0, pipe.x + PIPE_WIDTH, 0);
                pipeGrad.addColorStop(0, '#228B22');
                pipeGrad.addColorStop(0.5, '#32CD32');
                pipeGrad.addColorStop(1, '#228B22');
                ctx.fillStyle = pipeGrad;

                // Top pipe
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.gapY - PIPE_GAP / 2);
                ctx.fillRect(pipe.x - 5, pipe.gapY - PIPE_GAP / 2 - 20, PIPE_WIDTH + 10, 20);

                // Bottom pipe
                ctx.fillRect(pipe.x, pipe.gapY + PIPE_GAP / 2, PIPE_WIDTH, canvas.height - pipe.gapY - PIPE_GAP / 2);
                ctx.fillRect(pipe.x - 5, pipe.gapY + PIPE_GAP / 2, PIPE_WIDTH + 10, 20);

                // Score
                if (!pipe.scored && pipe.x + PIPE_WIDTH < bird.x) {
                    score++;
                    scoreDisplay.textContent = score;
                    pipe.scored = true;
                }

                // Collision detection
                if (
                    bird.x + bird.radius > pipe.x &&
                    bird.x - bird.radius < pipe.x + PIPE_WIDTH &&
                    (bird.y - bird.radius < pipe.gapY - PIPE_GAP / 2 ||
                     bird.y + bird.radius > pipe.gapY + PIPE_GAP / 2)
                ) {
                    gameOver();
                }
            });

            // Ground collision
            if (bird.y + bird.radius >= canvas.height - 50 || bird.y - bird.radius <= 0) {
                gameOver();
            }

            // Draw ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 10);

            animationId = requestAnimationFrame(update);
        }

        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyHighScore', highScore);
            }

            finalScore.textContent = score;
            highScoreText.textContent = `High Score: ${highScore}`;
            gameOverScreen.classList.remove('hidden');

            if (window.parent) {
                window.parent.postMessage({ type: 'gameOver', score, highScore }, '*');
            }
        }
    </script>
</body>
</html>
