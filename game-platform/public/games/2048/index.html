<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #faf8ef;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 48px;
            color: #776e65;
            text-align: center;
            margin-bottom: 10px;
        }
        .score-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .score-box {
            background: #bbada0;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-align: center;
        }
        .score-label { font-size: 12px; text-transform: uppercase; }
        .score-value { font-size: 24px; font-weight: bold; }
        .grid {
            background: #bbada0;
            border-radius: 5px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 10px;
        }
        .cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 3px;
        }
        .tile {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            border-radius: 3px;
            transition: all 0.15s ease;
        }
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 32px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 32px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 32px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 24px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 24px; }
        .controls {
            text-align: center;
            margin-top: 20px;
            color: #776e65;
        }
        button {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #9f8a76; }
        .game-over {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            font-weight: bold;
            color: #776e65;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        <div class="score-container">
            <div class="score-box">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Best</div>
                <div class="score-value" id="best">0</div>
            </div>
        </div>
        <div style="position: relative;">
            <div class="grid" id="grid"></div>
            <div class="game-over" id="gameOver">Game Over!</div>
        </div>
        <div class="controls">
            <button onclick="initGame()">New Game</button>
            <p>Use arrow keys or swipe to play</p>
        </div>
    </div>

    <script>
        let grid = [];
        let score = 0;
        let best = parseInt(localStorage.getItem('best2048')) || 0;
        document.getElementById('best').textContent = best;

        function initGame() {
            grid = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').style.display = 'none';
            addRandomTile();
            addRandomTile();
            renderGrid();
        }

        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) empty.push({r, c});
                }
            }
            if (empty.length > 0) {
                const {r, c} = empty[Math.floor(Math.random() * empty.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function renderGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (grid[r][c] !== 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile tile-${grid[r][c]}`;
                        tile.textContent = grid[r][c];
                        cell.appendChild(tile);
                    }
                    gridEl.appendChild(cell);
                }
            }
        }

        function slide(row) {
            let arr = row.filter(val => val);
            let missing = 4 - arr.length;
            let zeros = Array(missing).fill(0);
            return arr.concat(zeros);
        }

        function combine(row) {
            for (let i = 0; i < 3; i++) {
                if (row[i] !== 0 && row[i] === row[i + 1]) {
                    row[i] *= 2;
                    row[i + 1] = 0;
                    score += row[i];
                    document.getElementById('score').textContent = score;
                }
            }
            return row;
        }

        function moveLeft() {
            for (let r = 0; r < 4; r++) {
                let row = grid[r];
                row = slide(row);
                row = combine(row);
                row = slide(row);
                grid[r] = row;
            }
        }

        function rotateGrid() {
            let newGrid = Array(4).fill().map(() => Array(4).fill(0));
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    newGrid[c][3 - r] = grid[r][c];
                }
            }
            grid = newGrid;
        }

        function moveRight() {
            rotateGrid(); rotateGrid();
            moveLeft();
            rotateGrid(); rotateGrid();
        }

        function moveUp() {
            rotateGrid(); rotateGrid(); rotateGrid();
            moveLeft();
            rotateGrid();
        }

        function moveDown() {
            rotateGrid();
            moveLeft();
            rotateGrid(); rotateGrid(); rotateGrid();
        }

        function canMove() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) return true;
                    if (c < 3 && grid[r][c] === grid[r][c + 1]) return true;
                    if (r < 3 && grid[r][c] === grid[r + 1][c]) return true;
                }
            }
            return false;
        }

        function checkGameOver() {
            if (!canMove()) {
                document.getElementById('gameOver').style.display = 'flex';
                if (score > best) {
                    best = score;
                    localStorage.setItem('best2048', best);
                    document.getElementById('best').textContent = best;
                }
                if (window.parent) {
                    window.parent.postMessage({ type: 'gameOver', score, highScore: best }, '*');
                }
            }
        }

        function handleMove(direction) {
            const oldGrid = JSON.stringify(grid);
            switch(direction) {
                case 'left': moveLeft(); break;
                case 'right': moveRight(); break;
                case 'up': moveUp(); break;
                case 'down': moveDown(); break;
            }
            if (JSON.stringify(grid) !== oldGrid) {
                addRandomTile();
                renderGrid();
                checkGameOver();
            }
        }

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowLeft': handleMove('left'); break;
                case 'ArrowRight': handleMove('right'); break;
                case 'ArrowUp': handleMove('up'); break;
                case 'ArrowDown': handleMove('down'); break;
            }
        });

        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        document.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                handleMove(dx > 0 ? 'right' : 'left');
            } else {
                handleMove(dy > 0 ? 'down' : 'up');
            }
        });

        initGame();
    </script>
</body>
</html>
