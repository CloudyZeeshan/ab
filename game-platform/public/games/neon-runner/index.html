<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Runner - Endless Runner Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            max-width: 100%;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            color: #fff;
        }
        #startScreen h1, #gameOverScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #startScreen p, #gameOverScreen p {
            font-size: 20px;
            margin-bottom: 30px;
            color: #ccc;
        }
        .btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            pointer-events: all;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.4);
        }
        .hidden {
            display: none !important;
        }
        #finalScore {
            font-size: 36px;
            color: #f5576c;
            margin: 20px 0;
        }
        .controls {
            margin-top: 20px;
            font-size: 16px;
            color: #888;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="ui">
            <div id="score">Score: 0</div>
            <div id="coins">Coins: 0</div>
        </div>
        <div id="startScreen">
            <h1>🏃 NEON RUNNER</h1>
            <p>Run, jump, collect coins, and avoid obstacles!</p>
            <button class="btn" id="startBtn">START GAME</button>
            <div class="controls">
                <p>SPACE / UP / TAP - Jump</p>
                <p>Double jump allowed!</p>
            </div>
        </div>
        <div id="gameOverScreen" class="hidden">
            <h1>GAME OVER</h1>
            <div id="finalScore">0</div>
            <p id="highScore">High Score: 0</p>
            <button class="btn" id="restartBtn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreDisplay = document.getElementById('score');
        const coinsDisplay = document.getElementById('coins');
        const finalScore = document.getElementById('finalScore');
        const highScoreDisplay = document.getElementById('highScore');

        // Game state
        let gameRunning = false;
        let score = 0;
        let coins = 0;
        let highScore = parseInt(localStorage.getItem('neonRunnerHighScore')) || 0;
        let gameSpeed = 5;
        let frameCount = 0;

        // Player
        const player = {
            x: 100,
            y: 350,
            width: 50,
            height: 70,
            velocityY: 0,
            gravity: 0.8,
            jumpPower: -15,
            jumps: 0,
            maxJumps: 2,
            grounded: false,
            color: '#f093fb'
        };

        // Game objects
        let obstacles = [];
        let coinItems = [];
        let particles = [];
        let platforms = [];

        // Input handling
        let jumpPressed = false;

        function jump() {
            if (player.jumps < player.maxJumps) {
                player.velocityY = player.jumpPower;
                player.jumps++;
                player.grounded = false;
                createParticles(player.x + player.width / 2, player.y + player.height, 5, '#f093fb');
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (gameRunning) jump();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning) jump();
        });

        canvas.addEventListener('mousedown', (e) => {
            if (gameRunning) jump();
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        function startGame() {
            gameRunning = true;
            score = 0;
            coins = 0;
            gameSpeed = 5;
            frameCount = 0;
            obstacles = [];
            coinItems = [];
            particles = [];
            player.y = 350;
            player.velocityY = 0;
            player.jumps = 0;
            
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            
            // Initial platforms
            platforms = [
                { x: 0, y: 420, width: 800, height: 80 }
            ];
            
            update();
        }

        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 30,
                    color: color
                });
            }
        }

        function spawnObstacle() {
            const types = ['box', 'spike', 'tall'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            let obstacle = {
                x: 800,
                type: type
            };
            
            switch(type) {
                case 'box':
                    obstacle.y = 370;
                    obstacle.width = 50;
                    obstacle.height = 50;
                    obstacle.color = '#ff6b6b';
                    break;
                case 'spike':
                    obstacle.y = 390;
                    obstacle.width = 40;
                    obstacle.height = 30;
                    obstacle.color = '#ffd93d';
                    break;
                case 'tall':
                    obstacle.y = 320;
                    obstacle.width = 40;
                    obstacle.height = 100;
                    obstacle.color = '#6bcf7f';
                    break;
            }
            
            obstacles.push(obstacle);
        }

        function spawnCoin() {
            const yPositions = [250, 300, 350];
            coinItems.push({
                x: 800,
                y: yPositions[Math.floor(Math.random() * yPositions.length)],
                width: 30,
                height: 30,
                collected: false
            });
        }

        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

        function gameOver() {
            gameRunning = false;
            
            const totalScore = score + coins * 10;
            if (totalScore > highScore) {
                highScore = totalScore;
                localStorage.setItem('neonRunnerHighScore', highScore);
            }
            
            finalScore.textContent = totalScore;
            highScoreDisplay.textContent = `High Score: ${highScore}`;
            gameOverScreen.classList.remove('hidden');
            
            // Notify parent window about score
            if (window.parent) {
                window.parent.postMessage({
                    type: 'gameOver',
                    score: totalScore,
                    highScore: highScore
                }, '*');
            }
        }

        function update() {
            if (!gameRunning) return;
            
            frameCount++;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background stars
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const x = (i * 37 + frameCount * 0.5) % canvas.width;
                const y = (i * 23) % (canvas.height - 100);
                ctx.fillRect(x, y, 2, 2);
            }
            
            // Update player
            player.velocityY += player.gravity;
            player.y += player.velocityY;
            
            // Ground collision
            if (player.y + player.height >= 420) {
                player.y = 420 - player.height;
                player.velocityY = 0;
                player.jumps = 0;
                player.grounded = true;
            }
            
            // Draw ground
            const gradient = ctx.createLinearGradient(0, 420, 0, canvas.height);
            gradient.addColorStop(0, '#2d3748');
            gradient.addColorStop(1, '#1a202c');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 420, canvas.width, 80);
            
            // Draw ground line
            ctx.strokeStyle = '#f093fb';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, 420);
            ctx.lineTo(canvas.width, 420);
            ctx.stroke();
            
            // Draw player with glow effect
            ctx.shadowBlur = 20;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Player eyes
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + 30, player.y + 15, 8, 8);
            ctx.fillStyle = '#000';
            ctx.fillRect(player.x + 34, player.y + 17, 4, 4);
            
            // Spawn obstacles
            if (frameCount % 100 === 0) {
                spawnObstacle();
            }
            
            // Spawn coins
            if (frameCount % 60 === 0) {
                spawnCoin();
            }
            
            // Update and draw obstacles
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
            obstacles.forEach(obs => {
                obs.x -= gameSpeed;
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = obs.color;
                ctx.fillStyle = obs.color;
                
                if (obs.type === 'spike') {
                    ctx.beginPath();
                    ctx.moveTo(obs.x, obs.y + obs.height);
                    ctx.lineTo(obs.x + obs.width / 2, obs.y);
                    ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                }
                
                // Check collision
                if (checkCollision(player, obs)) {
                    gameOver();
                }
            });
            
            // Update and draw coins
            ctx.shadowBlur = 0;
            coinItems = coinItems.filter(coin => coin.x + coin.width > 0 && !coin.collected);
            coinItems.forEach(coin => {
                coin.x -= gameSpeed;
                
                // Draw coin
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ffd700';
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(coin.x + coin.width / 2, coin.y + coin.height / 2, 15, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('$', coin.x + coin.width / 2, coin.y + coin.height / 2 + 5);
                
                // Check collection
                if (checkCollision(player, coin)) {
                    coin.collected = true;
                    coins++;
                    createParticles(coin.x + coin.width / 2, coin.y + coin.height / 2, 10, '#ffd700');
                }
            });
            
            // Update and draw particles
            ctx.shadowBlur = 0;
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
            });
            ctx.globalAlpha = 1;
            
            // Update score
            if (frameCount % 10 === 0) {
                score++;
            }
            
            // Increase game speed over time
            if (frameCount % 500 === 0) {
                gameSpeed += 0.5;
            }
            
            // Update UI
            scoreDisplay.textContent = `Score: ${score}`;
            coinsDisplay.textContent = `Coins: ${coins}`;
            
            requestAnimationFrame(update);
        }

        // Draw initial high score
        highScoreDisplay.textContent = `High Score: ${highScore}`;
    </script>
</body>
</html>
